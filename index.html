<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slate — Project Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0b;
      --bg-primary: #111113;
      --bg-elevated: #18181b;
      --bg-card: #1c1c1f;
      --bg-hover: #242428;

      --border-subtle: #27272a;
      --border-default: #3f3f46;

      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;

      --leverage-bg: rgba(251, 191, 36, 0.08);
      --leverage-border: rgba(251, 191, 36, 0.3);
      --leverage-text: #fbbf24;
      --leverage-glow: rgba(251, 191, 36, 0.15);

      --neutral-bg: rgba(148, 163, 184, 0.06);
      --neutral-border: rgba(148, 163, 184, 0.2);
      --neutral-text: #94a3b8;

      --overhead-bg: rgba(113, 113, 122, 0.05);
      --overhead-border: rgba(113, 113, 122, 0.15);
      --overhead-text: #71717a;

      --column-todo: #3b82f6;
      --column-progress: #a855f7;
      --column-complete: #22c55e;

      --font-mono: 'JetBrains Mono', monospace;
      --font-serif: 'Newsreader', Georgia, serif;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-mono);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle scanline effect */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      gap: 1px;
      background: var(--border-subtle);
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      background: var(--bg-primary);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--column-todo), var(--column-progress));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }

    .logo-text {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.02em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--column-complete);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-dot.syncing {
      background: var(--column-todo);
    }

    .status-dot.offline {
      background: #ef4444;
    }

    .task-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .task-card:hover .task-delete {
      opacity: 1;
    }

    .task-delete:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .section-title {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    /* Kanban Board */
    .kanban {
      background: var(--bg-deep);
      padding: 20px;
      display: flex;
      gap: 16px;
      overflow-x: auto;
    }

    .kanban-column {
      flex: 1;
      min-width: 280px;
      max-width: 360px;
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-subtle);
    }

    .column-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .column-indicator {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    .column-todo .column-indicator { background: var(--column-todo); }
    .column-progress .column-indicator { background: var(--column-progress); }
    .column-complete .column-indicator { background: var(--column-complete); }

    .column-name {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .column-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    .column-cards {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      min-height: 200px;
    }

    .column-cards.drag-over {
      background: rgba(255, 255, 255, 0.02);
    }

    .add-card-btn {
      margin: 0 12px 12px;
      padding: 10px;
      background: transparent;
      border: 1px dashed var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .add-card-btn:hover {
      border-color: var(--border-default);
      color: var(--text-secondary);
      background: var(--bg-elevated);
    }

    /* Task Cards */
    .task-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 14px;
      cursor: grab;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid var(--border-subtle);
      position: relative;
    }

    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .task-card.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .task-card.leverage {
      background: var(--leverage-bg);
      border-color: var(--leverage-border);
      box-shadow: 0 0 20px var(--leverage-glow);
    }

    .task-card.neutral {
      background: var(--neutral-bg);
      border-color: var(--neutral-border);
    }

    .task-card.overhead {
      background: var(--overhead-bg);
      border-color: var(--overhead-border);
    }

    .task-priority {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .task-card.leverage .task-priority { color: var(--leverage-text); }
    .task-card.neutral .task-priority { color: var(--neutral-text); }
    .task-card.overhead .task-priority { color: var(--overhead-text); }

    .priority-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }

    .task-card.leverage .priority-dot {
      background: var(--leverage-text);
      box-shadow: 0 0 6px var(--leverage-text);
    }
    .task-card.neutral .priority-dot { background: var(--neutral-text); }
    .task-card.overhead .priority-dot { background: var(--overhead-text); }

    .task-title {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .task-tag {
      padding: 2px 8px;
      background: var(--bg-elevated);
      border-radius: 4px;
      font-size: 10px;
    }

    /* Notes Panel */
    .notes-panel {
      background: var(--bg-primary);
      padding: 20px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border-subtle);
    }

    .notes-textarea {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
      font-family: var(--font-serif);
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    .notes-textarea::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .notes-textarea:focus {
      border-color: var(--border-default);
    }

    .notes-footer {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 400px;
      max-width: 90vw;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-elevated);
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--column-todo);
    }

    .priority-options {
      display: flex;
      gap: 8px;
    }

    .priority-option {
      flex: 1;
      padding: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .priority-option:hover {
      border-color: var(--border-default);
    }

    .priority-option.leverage.selected {
      background: var(--leverage-bg);
      border-color: var(--leverage-border);
      color: var(--leverage-text);
    }

    .priority-option.neutral.selected {
      background: var(--neutral-bg);
      border-color: var(--neutral-border);
      color: var(--neutral-text);
    }

    .priority-option.overhead.selected {
      background: var(--overhead-bg);
      border-color: var(--overhead-border);
      color: var(--overhead-text);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .btn-primary {
      background: var(--column-todo);
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-default);
    }

    /* Animations */
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-card {
      animation: fadeSlideIn 0.3s ease-out;
    }
  </style>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, writeBatch } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDMJZQ5huBF0uhXSDN7YeJtNsm6cJqAMao",
      authDomain: "slate-20260124.firebaseapp.com",
      projectId: "slate-20260124",
      storageBucket: "slate-20260124.firebasestorage.app",
      messagingSenderId: "423781479597",
      appId: "1:423781479597:web:f20940ac92d5208079c224"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // State
    let tasks = [];
    let notes = '';
    let currentColumn = 'todo';
    let selectedPriority = 'neutral';
    let isOnline = true;

    // DOM Elements
    const modalOverlay = document.getElementById('modal-overlay');
    const taskTitleInput = document.getElementById('task-title-input');
    const priorityOptions = document.querySelectorAll('.priority-option');
    const modalCancel = document.getElementById('modal-cancel');
    const modalSubmit = document.getElementById('modal-submit');
    const notesTextarea = document.getElementById('notes-textarea');
    const notesCharCount = document.getElementById('notes-char-count');
    const syncStatus = document.getElementById('sync-status');

    // Real-time listener for tasks
    onSnapshot(collection(db, 'tasks'), (snapshot) => {
      tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderTasks();
      updateSyncStatus('synced');
    }, (error) => {
      console.error('Firestore error:', error);
      updateSyncStatus('offline');
      loadFromLocalStorage();
    });

    // Real-time listener for notes
    onSnapshot(doc(db, 'settings', 'notes'), (snapshot) => {
      if (snapshot.exists()) {
        notes = snapshot.data().content || '';
        notesTextarea.value = notes;
        updateCharCount();
      }
    });

    function updateSyncStatus(status) {
      if (status === 'synced') {
        syncStatus.innerHTML = '<span class="status-dot"></span> Synced';
        isOnline = true;
      } else if (status === 'syncing') {
        syncStatus.innerHTML = '<span class="status-dot syncing"></span> Syncing...';
      } else {
        syncStatus.innerHTML = '<span class="status-dot offline"></span> Offline';
        isOnline = false;
      }
    }

    // Priority Selection
    priorityOptions.forEach(option => {
      option.addEventListener('click', () => {
        priorityOptions.forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        selectedPriority = option.dataset.priority;
      });
    });

    // Add Card Buttons
    document.querySelectorAll('[data-add-card]').forEach(btn => {
      btn.addEventListener('click', () => {
        const column = btn.closest('.kanban-column');
        currentColumn = column.dataset.status;
        openModal();
      });
    });

    // Modal Controls
    function openModal() {
      modalOverlay.classList.add('active');
      taskTitleInput.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      taskTitleInput.value = '';
      selectedPriority = 'neutral';
      priorityOptions.forEach(o => o.classList.remove('selected'));
      document.querySelector('[data-priority="neutral"]').classList.add('selected');
    }

    modalCancel.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    modalSubmit.addEventListener('click', () => {
      const title = taskTitleInput.value.trim();
      if (title) {
        addTask(title, selectedPriority, currentColumn);
        closeModal();
      }
    });

    taskTitleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        modalSubmit.click();
      } else if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Task Management
    async function addTask(title, priority, status) {
      const task = {
        title,
        priority,
        status,
        createdAt: new Date().toISOString()
      };

      updateSyncStatus('syncing');
      try {
        const taskRef = doc(collection(db, 'tasks'));
        await setDoc(taskRef, task);
      } catch (error) {
        console.error('Error adding task:', error);
        // Fallback to localStorage
        task.id = Date.now().toString();
        tasks.push(task);
        saveToLocalStorage();
        renderTasks();
      }
    }

    async function updateTask(taskId, updates) {
      updateSyncStatus('syncing');
      try {
        await setDoc(doc(db, 'tasks', taskId), updates, { merge: true });
      } catch (error) {
        console.error('Error updating task:', error);
        const task = tasks.find(t => t.id === taskId);
        if (task) {
          Object.assign(task, updates);
          saveToLocalStorage();
          renderTasks();
        }
      }
    }

    async function deleteTask(taskId) {
      updateSyncStatus('syncing');
      try {
        await deleteDoc(doc(db, 'tasks', taskId));
      } catch (error) {
        console.error('Error deleting task:', error);
        tasks = tasks.filter(t => t.id !== taskId);
        saveToLocalStorage();
        renderTasks();
      }
    }

    function renderTasks() {
      document.querySelectorAll('.kanban-column').forEach(column => {
        const status = column.dataset.status;
        const cardsContainer = column.querySelector('[data-cards]');
        const countEl = column.querySelector('[data-count]');

        const columnTasks = tasks.filter(t => t.status === status);
        countEl.textContent = columnTasks.length;

        cardsContainer.innerHTML = columnTasks.map(task => `
          <div class="task-card ${task.priority}" draggable="true" data-task-id="${task.id}">
            <button class="task-delete" data-delete="${task.id}">&times;</button>
            <div class="task-priority">
              <span class="priority-dot"></span>
              ${task.priority}
            </div>
            <div class="task-title">${escapeHtml(task.title)}</div>
            <div class="task-meta">
              <span class="task-tag">${getTimeAgo(task.createdAt)}</span>
            </div>
          </div>
        `).join('');
      });

      // Delete buttons
      document.querySelectorAll('.task-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteTask(btn.dataset.delete);
        });
      });

      setupDragAndDrop();
    }

    // Drag and Drop
    function setupDragAndDrop() {
      const cards = document.querySelectorAll('.task-card');
      const columns = document.querySelectorAll('[data-cards]');

      cards.forEach(card => {
        card.addEventListener('dragstart', (e) => {
          card.classList.add('dragging');
          e.dataTransfer.setData('text/plain', card.dataset.taskId);
        });

        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          columns.forEach(col => col.classList.remove('drag-over'));
        });
      });

      columns.forEach(column => {
        column.addEventListener('dragover', (e) => {
          e.preventDefault();
          column.classList.add('drag-over');
        });

        column.addEventListener('dragleave', () => {
          column.classList.remove('drag-over');
        });

        column.addEventListener('drop', (e) => {
          e.preventDefault();
          column.classList.remove('drag-over');

          const taskId = e.dataTransfer.getData('text/plain');
          const newStatus = column.closest('.kanban-column').dataset.status;

          const task = tasks.find(t => t.id === taskId);
          if (task && task.status !== newStatus) {
            updateTask(taskId, { status: newStatus });
          }
        });
      });
    }

    // Notes with debounce
    let notesTimeout;
    notesTextarea.addEventListener('input', () => {
      notes = notesTextarea.value;
      updateCharCount();

      clearTimeout(notesTimeout);
      notesTimeout = setTimeout(() => {
        saveNotes();
      }, 500);
    });

    async function saveNotes() {
      updateSyncStatus('syncing');
      try {
        await setDoc(doc(db, 'settings', 'notes'), { content: notes });
      } catch (error) {
        console.error('Error saving notes:', error);
        localStorage.setItem('slate-notes', notes);
      }
    }

    function updateCharCount() {
      notesCharCount.textContent = `${notesTextarea.value.length} characters`;
    }

    // Local Storage Fallback
    function saveToLocalStorage() {
      localStorage.setItem('slate-tasks', JSON.stringify(tasks));
      localStorage.setItem('slate-notes', notes);
    }

    function loadFromLocalStorage() {
      try {
        const localTasks = JSON.parse(localStorage.getItem('slate-tasks'));
        const localNotes = localStorage.getItem('slate-notes');
        if (localTasks) tasks = localTasks;
        if (localNotes) {
          notes = localNotes;
          notesTextarea.value = notes;
        }
        renderTasks();
        updateCharCount();
      } catch {
        tasks = [];
        notes = '';
      }
    }

    // Utilities
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getTimeAgo(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const seconds = Math.floor((now - date) / 1000);

      if (seconds < 60) return 'just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
        closeModal();
      }
    });

    // Initial render
    renderTasks();
    updateCharCount();
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <div class="logo-mark">S</div>
        <span class="logo-text">Slate</span>
      </div>
      <div class="header-meta">
        <span>Project Alpha</span>
<span id="sync-status" style="display: flex; align-items: center; gap: 6px;">
          <span class="status-dot"></span>
          Connecting...
        </span>
      </div>
    </header>

    <main class="kanban">
      <div class="kanban-column column-todo" data-status="todo">
        <div class="column-header">
          <div class="column-indicator"></div>
          <span class="column-name">To Do</span>
          <span class="column-count" data-count>0</span>
        </div>
        <div class="column-cards" data-cards></div>
        <button class="add-card-btn" data-add-card>+ Add task</button>
      </div>

      <div class="kanban-column column-progress" data-status="progress">
        <div class="column-header">
          <div class="column-indicator"></div>
          <span class="column-name">In Progress</span>
          <span class="column-count" data-count>0</span>
        </div>
        <div class="column-cards" data-cards></div>
        <button class="add-card-btn" data-add-card>+ Add task</button>
      </div>

      <div class="kanban-column column-complete" data-status="complete">
        <div class="column-header">
          <div class="column-indicator"></div>
          <span class="column-name">Complete</span>
          <span class="column-count" data-count>0</span>
        </div>
        <div class="column-cards" data-cards></div>
        <button class="add-card-btn" data-add-card>+ Add task</button>
      </div>
    </main>

    <aside class="notes-panel">
      <div class="section-header">
        <span class="section-title">Notes</span>
      </div>
      <textarea class="notes-textarea" id="notes-textarea" placeholder="Write your thoughts, ideas, or project notes here..."></textarea>
      <div class="notes-footer">
        <span id="notes-char-count">0 characters</span>
        <span>Markdown supported</span>
      </div>
    </aside>
  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">New Task</h3>
      <div class="form-group">
        <label class="form-label">Task Title</label>
        <input type="text" class="form-input" id="task-title-input" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <div class="priority-options">
          <div class="priority-option leverage" data-priority="leverage">Leverage</div>
          <div class="priority-option neutral selected" data-priority="neutral">Neutral</div>
          <div class="priority-option overhead" data-priority="overhead">Overhead</div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-submit">Add Task</button>
      </div>
    </div>
  </div>

</body>
</html>
