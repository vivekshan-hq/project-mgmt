<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slate — Group Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;1,6..72,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0b;
      --bg-primary: #111113;
      --bg-elevated: #18181b;
      --bg-card: #1c1c1f;
      --bg-hover: #242428;

      --border-subtle: #27272a;
      --border-default: #3f3f46;

      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;

      --leverage-bg: rgba(251, 191, 36, 0.08);
      --leverage-border: rgba(251, 191, 36, 0.3);
      --leverage-text: #fbbf24;
      --leverage-glow: rgba(251, 191, 36, 0.15);

      --neutral-bg: rgba(148, 163, 184, 0.06);
      --neutral-border: rgba(148, 163, 184, 0.2);
      --neutral-text: #94a3b8;

      --overhead-bg: rgba(113, 113, 122, 0.05);
      --overhead-border: rgba(113, 113, 122, 0.15);
      --overhead-text: #71717a;

      --column-todo: #3b82f6;
      --column-progress: #a855f7;
      --column-complete: #22c55e;

      --font-mono: 'JetBrains Mono', monospace;
      --font-serif: 'Newsreader', Georgia, serif;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.4), 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-mono);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background texture */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(59, 130, 246, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle scanline effect */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      gap: 1px;
      background: var(--border-subtle);
    }

    /* Header */
    .header {
      grid-column: 1 / -1;
      background: var(--bg-primary);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--column-todo), var(--column-progress));
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }

    .logo-text {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.02em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--column-complete);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-dot.syncing {
      background: var(--column-todo);
    }

    .status-dot.offline {
      background: #ef4444;
    }

    .task-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .task-card:hover .task-delete {
      opacity: 1;
    }

    .task-delete:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    /* Group Selector */
    .group-selector {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .group-dropdown {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-primary);
      cursor: pointer;
      outline: none;
      min-width: 140px;
    }

    .group-dropdown:focus {
      border-color: var(--column-todo);
    }

    .add-group-btn {
      width: 28px;
      height: 28px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .add-group-btn:hover {
      border-color: var(--border-default);
      color: var(--text-secondary);
    }

    /* Delete Confirmation Modal */
    .modal.modal-sm {
      width: 320px;
    }

    .modal-message {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .modal-task-preview {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text-primary);
      margin-top: 12px;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    /* Form Select */
    .form-select {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      cursor: pointer;
    }

    .form-select:focus {
      border-color: var(--column-todo);
    }

    .form-textarea {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      resize: vertical;
      min-height: 80px;
      max-height: 200px;
      transition: border-color 0.2s;
    }

    .form-textarea:focus {
      border-color: var(--column-todo);
    }

    .form-textarea::placeholder {
      color: var(--text-muted);
    }

    .task-notes-wrapper {
      position: static;
      display: flex;
      align-items: center;
    }

    .task-card {
      overflow: visible;
    }

    .task-meta {
      position: relative;
    }

    .task-notes-indicator {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
      cursor: pointer;
    }

    .task-notes-wrapper:hover .task-notes-indicator {
      color: var(--text-secondary);
    }

    .task-notes-tooltip {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      width: 240px;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: var(--shadow-elevated);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s, visibility 0.15s;
      z-index: 10000;
    }

    .task-notes-wrapper:hover .task-notes-tooltip {
      opacity: 1;
      visibility: visible;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .section-title {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    /* Kanban Board */
    .kanban {
      background: var(--bg-deep);
      padding: 20px;
      display: flex;
      gap: 16px;
      overflow-x: auto;
    }

    .kanban-column {
      flex: 1;
      min-width: 280px;
      max-width: 360px;
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border-subtle);
    }

    .column-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .column-indicator {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    .column-todo .column-indicator { background: var(--column-todo); }
    .column-progress .column-indicator { background: var(--column-progress); }
    .column-complete .column-indicator { background: var(--column-complete); }

    .column-name {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .column-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    .column-cards {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      min-height: 200px;
    }

    .column-cards.drag-over {
      background: rgba(255, 255, 255, 0.02);
    }

    .add-card-btn {
      margin: 0 12px 12px;
      padding: 10px;
      background: transparent;
      border: 1px dashed var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .add-card-btn:hover {
      border-color: var(--border-default);
      color: var(--text-secondary);
      background: var(--bg-elevated);
    }

    /* Task Cards */
    .task-card {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      padding: 14px;
      cursor: grab;
      transition: transform 0.15s, box-shadow 0.15s;
      border: 1px solid var(--border-subtle);
      position: relative;
    }

    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .task-card.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .task-card.leverage {
      background: var(--leverage-bg);
      border-color: var(--leverage-border);
      box-shadow: 0 0 20px var(--leverage-glow);
    }

    .task-card.neutral {
      background: var(--neutral-bg);
      border-color: var(--neutral-border);
    }

    .task-card.overhead {
      background: var(--overhead-bg);
      border-color: var(--overhead-border);
    }

    .task-group-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .task-priority-pill {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      text-transform: capitalize;
    }

    .task-priority-pill.leverage {
      background: var(--leverage-bg);
      color: var(--leverage-text);
      border: 1px solid var(--leverage-border);
    }

    .task-priority-pill.neutral {
      background: var(--neutral-bg);
      color: var(--neutral-text);
      border: 1px solid var(--neutral-border);
    }

    .task-priority-pill.overhead {
      background: var(--overhead-bg);
      color: var(--overhead-text);
      border: 1px solid var(--overhead-border);
    }

    .task-title {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--text-primary);
      margin-bottom: 10px;
      word-wrap: break-word;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .task-tag {
      padding: 2px 8px;
      background: var(--bg-elevated);
      border-radius: 4px;
      font-size: 10px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-elevated);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 400px;
      max-width: 90vw;
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-elevated);
      transform: translateY(20px);
      transition: transform 0.2s;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: var(--column-todo);
    }

    .priority-options {
      display: flex;
      gap: 8px;
    }

    .priority-option {
      flex: 1;
      padding: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .priority-option:hover {
      border-color: var(--border-default);
    }

    .priority-option.leverage.selected {
      background: var(--leverage-bg);
      border-color: var(--leverage-border);
      color: var(--leverage-text);
    }

    .priority-option.neutral.selected {
      background: var(--neutral-bg);
      border-color: var(--neutral-border);
      color: var(--neutral-text);
    }

    .priority-option.overhead.selected {
      background: var(--overhead-bg);
      border-color: var(--overhead-border);
      color: var(--overhead-text);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .btn-primary {
      background: var(--column-todo);
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-default);
    }

    /* Animations */
    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-card {
      animation: fadeSlideIn 0.3s ease-out;
    }
  </style>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, writeBatch } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyDMJZQ5huBF0uhXSDN7YeJtNsm6cJqAMao",
      authDomain: "slate-20260124.firebaseapp.com",
      projectId: "slate-20260124",
      storageBucket: "slate-20260124.firebasestorage.app",
      messagingSenderId: "423781479597",
      appId: "1:423781479597:web:f20940ac92d5208079c224"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // State
    let tasks = [];
    let groups = [];
    let currentColumn = 'todo';
    let selectedPriority = 'neutral';
    let selectedGroup = 'all';
    let isOnline = true;
    let taskToDelete = null;
    let editingTaskId = null;

    // DOM Elements
    const modalOverlay = document.getElementById('modal-overlay');
    const taskTitleInput = document.getElementById('task-title-input');
    const taskGroupSelect = document.getElementById('task-group-select');
    const taskNotesInput = document.getElementById('task-notes-input');
    const priorityOptions = document.querySelectorAll('.priority-option');
    const modalCancel = document.getElementById('modal-cancel');
    const modalSubmit = document.getElementById('modal-submit');
    const syncStatus = document.getElementById('sync-status');
    const groupDropdown = document.getElementById('group-dropdown');
    const addGroupBtn = document.getElementById('add-group-btn');
    const deleteModalOverlay = document.getElementById('delete-modal-overlay');
    const deleteTaskPreview = document.getElementById('delete-task-preview');
    const deleteCancel = document.getElementById('delete-cancel');
    const deleteConfirm = document.getElementById('delete-confirm');
    const groupModalOverlay = document.getElementById('group-modal-overlay');
    const groupNameInput = document.getElementById('group-name-input');
    const groupCancel = document.getElementById('group-cancel');
    const groupSubmit = document.getElementById('group-submit');

    // Real-time listener for tasks
    onSnapshot(collection(db, 'tasks'), (snapshot) => {
      tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderTasks();
      updateSyncStatus('synced');
    }, (error) => {
      console.error('Firestore error:', error);
      updateSyncStatus('offline');
      loadFromLocalStorage();
    });

    // Real-time listener for groups (stored as 'projects' in Firebase)
    onSnapshot(collection(db, 'projects'), (snapshot) => {
      groups = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderGroupDropdowns();
      renderTasks();
    }, (error) => {
      console.error('Groups error:', error);
    });

    // Render group dropdowns
    function renderGroupDropdowns() {
      const groupOptions = groups.map(p =>
        `<option value="${p.id}">${escapeHtml(p.name)}</option>`
      ).join('');

      // Main dropdown - show "Add new group" option if no groups exist
      if (groups.length === 0) {
        groupDropdown.innerHTML = `
          <option value="all">All Tasks</option>
          <option value="__add_new__">+ Add new group</option>
        `;
      } else {
        groupDropdown.innerHTML = `
          <option value="all">All Groups</option>
          ${groupOptions}
        `;
      }
      groupDropdown.value = selectedGroup;

      // Task form dropdown - always show "Add new group" option
      taskGroupSelect.innerHTML = `
        <option value="">No Group</option>
        ${groupOptions}
        <option value="__add_new__">+ Add new group</option>
      `;
    }

    // Handle "Add new group" selection in task form
    taskGroupSelect.addEventListener('change', () => {
      if (taskGroupSelect.value === '__add_new__') {
        taskGroupSelect.value = '';
        groupModalOverlay.classList.add('active');
        groupNameInput.focus();
      }
    });

    // Group dropdown change
    groupDropdown.addEventListener('change', () => {
      if (groupDropdown.value === '__add_new__') {
        // Reset to "all" and open add group modal
        groupDropdown.value = 'all';
        groupModalOverlay.classList.add('active');
        groupNameInput.focus();
      } else {
        selectedGroup = groupDropdown.value;
        renderTasks();
      }
    });

    // Add Group Button
    addGroupBtn.addEventListener('click', () => {
      groupModalOverlay.classList.add('active');
      groupNameInput.focus();
    });

    // Group Modal Controls
    groupCancel.addEventListener('click', () => {
      groupModalOverlay.classList.remove('active');
      groupNameInput.value = '';
    });

    groupModalOverlay.addEventListener('click', (e) => {
      if (e.target === groupModalOverlay) {
        groupModalOverlay.classList.remove('active');
        groupNameInput.value = '';
      }
    });

    groupSubmit.addEventListener('click', async () => {
      const name = groupNameInput.value.trim();
      if (name) {
        updateSyncStatus('syncing');
        try {
          const groupRef = doc(collection(db, 'projects'));
          await setDoc(groupRef, { name, createdAt: new Date().toISOString() });
        } catch (error) {
          console.error('Error adding group:', error);
        }
        groupModalOverlay.classList.remove('active');
        groupNameInput.value = '';
      }
    });

    groupNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        groupSubmit.click();
      } else if (e.key === 'Escape') {
        groupModalOverlay.classList.remove('active');
        groupNameInput.value = '';
      }
    });

    // Delete Confirmation Modal
    function showDeleteConfirmation(taskId) {
      const task = tasks.find(t => t.id === taskId);
      if (task) {
        taskToDelete = taskId;
        deleteTaskPreview.textContent = task.title;
        deleteModalOverlay.classList.add('active');
      }
    }

    deleteCancel.addEventListener('click', () => {
      deleteModalOverlay.classList.remove('active');
      taskToDelete = null;
    });

    deleteModalOverlay.addEventListener('click', (e) => {
      if (e.target === deleteModalOverlay) {
        deleteModalOverlay.classList.remove('active');
        taskToDelete = null;
      }
    });

    deleteConfirm.addEventListener('click', async () => {
      if (taskToDelete) {
        await deleteTask(taskToDelete);
        deleteModalOverlay.classList.remove('active');
        taskToDelete = null;
      }
    });

    function updateSyncStatus(status) {
      if (status === 'synced') {
        syncStatus.innerHTML = '<span class="status-dot"></span> Synced';
        isOnline = true;
      } else if (status === 'syncing') {
        syncStatus.innerHTML = '<span class="status-dot syncing"></span> Syncing...';
      } else {
        syncStatus.innerHTML = '<span class="status-dot offline"></span> Offline';
        isOnline = false;
      }
    }

    // Priority Selection
    priorityOptions.forEach(option => {
      option.addEventListener('click', () => {
        priorityOptions.forEach(o => o.classList.remove('selected'));
        option.classList.add('selected');
        selectedPriority = option.dataset.priority;
      });
    });

    // Add Card Buttons
    document.querySelectorAll('[data-add-card]').forEach(btn => {
      btn.addEventListener('click', () => {
        const column = btn.closest('.kanban-column');
        currentColumn = column.dataset.status;
        openModal();
      });
    });

    // Modal Controls
    const modalTitle = document.querySelector('#modal-overlay .modal-title');

    function openModal(taskId = null) {
      editingTaskId = taskId;

      if (taskId) {
        // Edit mode - populate fields
        const task = tasks.find(t => t.id === taskId);
        if (task) {
          modalTitle.textContent = 'Edit Task';
          modalSubmit.textContent = 'Save';
          taskTitleInput.value = task.title || '';
          taskGroupSelect.value = task.projectId || '';
          taskNotesInput.value = task.notes || '';
          selectedPriority = task.priority || 'neutral';
          priorityOptions.forEach(o => {
            o.classList.toggle('selected', o.dataset.priority === selectedPriority);
          });
        }
      } else {
        // Add mode
        modalTitle.textContent = 'New Task';
        modalSubmit.textContent = 'Add Task';
      }

      modalOverlay.classList.add('active');
      taskTitleInput.focus();
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      taskTitleInput.value = '';
      taskGroupSelect.value = '';
      taskNotesInput.value = '';
      selectedPriority = 'neutral';
      editingTaskId = null;
      priorityOptions.forEach(o => o.classList.remove('selected'));
      document.querySelector('[data-priority="neutral"]').classList.add('selected');
    }

    modalCancel.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });

    modalSubmit.addEventListener('click', async () => {
      const title = taskTitleInput.value.trim();
      const groupId = taskGroupSelect.value;
      const notes = taskNotesInput.value.trim();
      if (title) {
        if (editingTaskId) {
          // Update existing task
          await updateTask(editingTaskId, {
            title,
            priority: selectedPriority,
            projectId: groupId || '',
            notes: notes || ''
          });
        } else {
          // Add new task
          addTask(title, selectedPriority, currentColumn, groupId, notes);
        }
        closeModal();
      }
    });

    taskTitleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        modalSubmit.click();
      } else if (e.key === 'Escape') {
        closeModal();
      }
    });

    // Task Management
    async function addTask(title, priority, status, groupId, notes) {
      const task = {
        title,
        priority,
        status,
        projectId: groupId || '',
        notes: notes || '',
        createdAt: new Date().toISOString()
      };

      updateSyncStatus('syncing');
      try {
        const taskRef = doc(collection(db, 'tasks'));
        await setDoc(taskRef, task);
      } catch (error) {
        console.error('Error adding task:', error);
        // Fallback to localStorage
        task.id = Date.now().toString();
        tasks.push(task);
        saveToLocalStorage();
        renderTasks();
      }
    }

    async function updateTask(taskId, updates) {
      updateSyncStatus('syncing');
      try {
        await setDoc(doc(db, 'tasks', taskId), updates, { merge: true });
      } catch (error) {
        console.error('Error updating task:', error);
        const task = tasks.find(t => t.id === taskId);
        if (task) {
          Object.assign(task, updates);
          saveToLocalStorage();
          renderTasks();
        }
      }
    }

    async function deleteTask(taskId) {
      updateSyncStatus('syncing');
      try {
        await deleteDoc(doc(db, 'tasks', taskId));
      } catch (error) {
        console.error('Error deleting task:', error);
        tasks = tasks.filter(t => t.id !== taskId);
        saveToLocalStorage();
        renderTasks();
      }
    }

    function renderTasks() {
      // Filter tasks by selected group
      const filteredTasks = selectedGroup === 'all'
        ? tasks
        : tasks.filter(t => t.projectId === selectedGroup);

      document.querySelectorAll('.kanban-column').forEach(column => {
        const status = column.dataset.status;
        const cardsContainer = column.querySelector('[data-cards]');
        const countEl = column.querySelector('[data-count]');

        const columnTasks = filteredTasks.filter(t => t.status === status);
        countEl.textContent = columnTasks.length;

        cardsContainer.innerHTML = columnTasks.map(task => {
          const group = groups.find(p => p.id === task.projectId);
          const groupLabel = group
            ? `<div class="task-group-label">${escapeHtml(group.name)}</div>`
            : '';
          const notesIndicator = task.notes
            ? `<span class="task-notes-wrapper">
                <svg class="task-notes-indicator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                <span class="task-notes-tooltip">${escapeHtml(task.notes)}</span>
              </span>`
            : '';

          return `
            <div class="task-card ${task.priority}" draggable="true" data-task-id="${task.id}">
              <button class="task-delete" data-delete="${task.id}">&times;</button>
              ${groupLabel}
              <div class="task-title">${escapeHtml(task.title || 'Untitled')}</div>
              <div class="task-meta">
                <span class="task-tag">${getTimeAgo(task.createdAt)}</span>
                <span class="task-priority-pill ${task.priority}">${task.priority}</span>
                ${notesIndicator}
              </div>
            </div>
          `;
        }).join('');
      });

      // Delete buttons - show confirmation instead of direct delete
      document.querySelectorAll('.task-delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          showDeleteConfirmation(btn.dataset.delete);
        });
      });

      // Click to edit task
      document.querySelectorAll('.task-card').forEach(card => {
        card.addEventListener('click', (e) => {
          // Don't open edit if clicking delete button
          if (e.target.closest('.task-delete')) return;
          openModal(card.dataset.taskId);
        });
      });

      setupDragAndDrop();
    }

    // Drag and Drop
    function setupDragAndDrop() {
      const cards = document.querySelectorAll('.task-card');
      const columns = document.querySelectorAll('[data-cards]');

      cards.forEach(card => {
        card.addEventListener('dragstart', (e) => {
          card.classList.add('dragging');
          e.dataTransfer.setData('text/plain', card.dataset.taskId);
        });

        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          columns.forEach(col => col.classList.remove('drag-over'));
        });
      });

      columns.forEach(column => {
        column.addEventListener('dragover', (e) => {
          e.preventDefault();
          column.classList.add('drag-over');
        });

        column.addEventListener('dragleave', () => {
          column.classList.remove('drag-over');
        });

        column.addEventListener('drop', (e) => {
          e.preventDefault();
          column.classList.remove('drag-over');

          const taskId = e.dataTransfer.getData('text/plain');
          const newStatus = column.closest('.kanban-column').dataset.status;

          const task = tasks.find(t => t.id === taskId);
          if (task && task.status !== newStatus) {
            updateTask(taskId, { status: newStatus });
          }
        });
      });
    }

    // Local Storage Fallback
    function saveToLocalStorage() {
      localStorage.setItem('slate-tasks', JSON.stringify(tasks));
    }

    function loadFromLocalStorage() {
      try {
        const localTasks = JSON.parse(localStorage.getItem('slate-tasks'));
        if (localTasks) tasks = localTasks;
        renderTasks();
      } catch {
        tasks = [];
      }
    }

    // Utilities
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getTimeAgo(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const seconds = Math.floor((now - date) / 1000);

      if (seconds < 60) return 'just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (modalOverlay.classList.contains('active')) {
          closeModal();
        }
        if (deleteModalOverlay.classList.contains('active')) {
          deleteModalOverlay.classList.remove('active');
          taskToDelete = null;
        }
        if (groupModalOverlay.classList.contains('active')) {
          groupModalOverlay.classList.remove('active');
          groupNameInput.value = '';
        }
      }
    });

    // Initial render
    renderTasks();
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <div class="logo-mark">S</div>
        <span class="logo-text">Slate</span>
      </div>
      <div class="group-selector">
        <select class="group-dropdown" id="group-dropdown">
          <option value="all">All Groups</option>
        </select>
        <button class="add-group-btn" id="add-group-btn" title="New Group">+</button>
      </div>
      <div class="header-meta">
<span id="sync-status" style="display: flex; align-items: center; gap: 6px;">
          <span class="status-dot"></span>
          Connecting...
        </span>
      </div>
    </header>

    <main class="kanban">
      <div class="kanban-column column-todo" data-status="todo">
        <div class="column-header">
          <div class="column-indicator"></div>
          <span class="column-name">To Do</span>
          <span class="column-count" data-count>0</span>
        </div>
        <div class="column-cards" data-cards></div>
        <button class="add-card-btn" data-add-card>+ Add task</button>
      </div>

      <div class="kanban-column column-progress" data-status="progress">
        <div class="column-header">
          <div class="column-indicator"></div>
          <span class="column-name">In Progress</span>
          <span class="column-count" data-count>0</span>
        </div>
        <div class="column-cards" data-cards></div>
        <button class="add-card-btn" data-add-card>+ Add task</button>
      </div>

      <div class="kanban-column column-complete" data-status="complete">
        <div class="column-header">
          <div class="column-indicator"></div>
          <span class="column-name">Complete</span>
          <span class="column-count" data-count>0</span>
        </div>
        <div class="column-cards" data-cards></div>
        <button class="add-card-btn" data-add-card>+ Add task</button>
      </div>
    </main>

  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h3 class="modal-title">New Task</h3>
      <div class="form-group">
        <label class="form-label">Task Title</label>
        <input type="text" class="form-input" id="task-title-input" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label class="form-label">Group</label>
        <select class="form-select" id="task-group-select">
          <option value="">No Group</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <div class="priority-options">
          <div class="priority-option leverage" data-priority="leverage">Leverage</div>
          <div class="priority-option neutral selected" data-priority="neutral">Neutral</div>
          <div class="priority-option overhead" data-priority="overhead">Overhead</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-textarea" id="task-notes-input" placeholder="Add details, links, or context..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-submit">Add Task</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal-overlay">
    <div class="modal modal-sm">
      <h3 class="modal-title">Delete Task</h3>
      <p class="modal-message">Are you sure you want to delete this task?</p>
      <div class="modal-task-preview" id="delete-task-preview"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="delete-cancel">Cancel</button>
        <button class="btn btn-danger" id="delete-confirm">Delete</button>
      </div>
    </div>
  </div>

  <!-- Add Group Modal -->
  <div class="modal-overlay" id="group-modal-overlay">
    <div class="modal modal-sm">
      <h3 class="modal-title">New Group</h3>
      <div class="form-group">
        <label class="form-label">Group Name</label>
        <input type="text" class="form-input" id="group-name-input" placeholder="e.g. Website, Mobile App">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="group-cancel">Cancel</button>
        <button class="btn btn-primary" id="group-submit">Create</button>
      </div>
    </div>
  </div>

</body>
</html>
